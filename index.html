<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AML Apex Motorsport League</title>

<style>

body{
    margin:0;
    background:#0f1115;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#11151b;
    padding:20px;
    text-align:center;
    border-bottom:3px solid #c8ff00;
}

.logo{
    width:300px;
}

.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:48px;
    margin-bottom:10px;
}

.hero p{
    color:#c8ff00;
    font-size:20px;
}

.btn{
    background:#c8ff00;
    color:black;
    padding:15px 30px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.section{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:#161a20;
    border:1px solid #252b33;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

</style>
</head>

<body>

<header>
<img src="https://i.imgur.com/tcdrVJ1.png" class="logo">
</header>

<section class="hero">
<h1>AML Apex Motorsport League</h1>
<p>COMPETE • EVOLUA • VENÇA</p>
<br>
<a class="btn" href="#">Entrar no Discord</a>
</section>

<section class="section">

<div class="card">
<h2>Próxima Corrida</h2>
<p>🇸🇬 Singapore GP</p>
<p>30/06/2026</p>
</div>

<div class="card">
<h2>Calendário 2026</h2>

<p>🇶🇦 Lusail — 16/06/2026</p>
<p>🇦🇿 Baku — 23/06/2026</p>
<p>🇸🇬 Singapore — 30/06/2026</p>

</div>

</section>

</body>
</html>
