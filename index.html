<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AML Apex Motorsport League</title>
<style>
:root{--green:#c8ff00;--dark:#0f1115;--card:#161a20;--border:#252b33}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f1115;color:#fff}
header{position:sticky;top:0;background:#11151b;border-bottom:2px solid var(--green)}
nav{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;padding:15px}
nav a{color:#fff;text-decoration:none}
section{max-width:1200px;margin:auto;padding:40px 20px}
.hero{text-align:center;padding:60px 20px;background:linear-gradient(rgba(15,17,21,.85),rgba(15,17,21,.85)),url('https://i.imgur.com/3Bbpuac.png');background-size:cover}
.hero img{max-width:320px}
.card{background:var(--card);border:1px solid var(--border);padding:15px;border-radius:10px;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--border)}
th{background:var(--green);color:#000}
h2{color:var(--green);margin-bottom:15px}
</style>
</head>
<body>

<script>
const SITE={
nomeLiga:"AML Apex Motorsport League",
slogan:"COMPETE • EVOLUA • VENÇA",
logo:"https://i.imgur.com/tcdrVJ1.png",
fundo:"https://i.imgur.com/3Bbpuac.png",
discord:"https://discord.gg/tjF3EN53Hs",
youtube:"",

calendario:[
{},
{},
{}
],

pilotos:[
{}
],

equipes:[
{}
],

classificacao:[
{}
]
};
</script>

<header><nav>
<a href="#home">Home</a>
<a href="#cal">Calendário</a>
<a href="#cls">Classificação</a>
<a href="#pil">Pilotos</a>
<a href="#eq">Equipes</a>
<a href="#tv">AML TV</a>
</nav></header>

<section id="home" class="hero">
<img id="logo">
<h1 id="nome"></h1>
<p id="slogan"></p>
<p><a id="discord" style="color:#c8ff00">Discord</a></p>
</section>

<section id="cal"><h2>Calendário</h2><div id="calendario"></div></section>

<section id="cls"><h2>Classificação</h2>
<table><thead><tr><th>Pos</th><th>Piloto</th><th>Equipe</th><th>Pontos</th></tr></thead>
<tbody id="classificacao"></tbody></table>
</section>

<section id="pil"><h2>Pilotos</h2><div class="grid" id="pilotos"></div></section>

<section id="eq"><h2>Equipes</h2><div class="grid" id="equipes"></div></section>

<section id="tv"><h2>AML TV</h2><div class="card">Cole o link do YouTube em SITE.youtube</div></section>

<script>
document.getElementById('logo').src=SITE.logo;
document.getElementById('nome').textContent=SITE.nomeLiga;
document.getElementById('slogan').textContent=SITE.slogan;
document.getElementById('discord').href=SITE.discord;

SITE.calendario.forEach(r=>{
document.getElementById('calendario').innerHTML+=`<div class="card">🏁 Round ${r.round} — ${r.circuito} — ${r.data}</div>`;
});

SITE.pilotos.forEach(p=>{
document.getElementById('pilotos').innerHTML+=`<div class="card">#${p.numero}<br>${p.nome}<br>${p.equipe}<br>${p.categoria}</div>`;
});

SITE.equipes.forEach(e=>{
document.getElementById('equipes').innerHTML+=`<div class="card">${e.nome}<br>${e.categoria}</div>`;
});

SITE.classificacao.forEach(c=>{
document.getElementById('classificacao').innerHTML+=`<tr><td>${c.pos}</td><td>${c.piloto}</td><td>${c.equipe}</td><td>${c.pontos}</td></tr>`;
});
</script>
</body></html>
