<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AML Apex Motorsport League</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f1115;
color:white;
}

header{
background:#11151b;
border-bottom:3px solid #c8ff00;
padding:20px;
text-align:center;
}

.logo{
width:280px;
}

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
url("https://i.imgur.com/3Bbpuac.png");

background-size:cover;
background-position:center;
}

.hero h1{
font-size:4rem;
}

.hero p{
color:#c8ff00;
font-size:1.3rem;
margin-top:10px;
}

.btn{
margin-top:30px;
padding:15px 30px;
background:#c8ff00;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:10px;
}

.section{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.card{
background:#161a20;
border:1px solid #252b33;
border-radius:12px;
padding:25px;
margin-bottom:20px;
}

h2{
margin-bottom:20px;
color:#c8ff00;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid #252b33;
}

</style>
</head>

<body>

<header>
<img src="https://i.imgur.com/tcdrVJ1.png" class="logo">
</header>

<section class="hero">
<h1>AML APEX MOTORSPORT LEAGUE</h1>
<p>COMPETE • EVOLUA • VENÇA</p>

<a href="#" class="btn">ENTRAR NO DISCORD</a>
</section>

<section class="section">

<h2>Calendário 2026</h2>

<div class="card">
🏁 Round 01 — Lusail 🇶🇦<br>
📅 16/06/2026
</div>

<div class="card">
🏁 Round 02 — Baku 🇦🇿<br>
📅 23/06/2026
</div>

<div class="card">
🏁 Round 03 — Singapore 🇸🇬<br>
📅 30/06/2026
</div>

</section>

<footer>
AML Apex Motorsport League © 2026
</footer>

</body>
</html>
